name: Deploy to GitHub Pages

# Déploie automatiquement le site à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi de relancer le déploiement à la main

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
